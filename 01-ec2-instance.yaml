- name: create ec2 instance
  hosts: local
  connection: local
  vars:
    ami: "ami-0220d79f3f480ecf5"
    security_group: "sg-0c38430134803699d"
    zone_id: "Z086025214DK5VMINA2N"
    domain_name: "anuragaws.shop"
    # instances:
    # - mongodb
    # - redis
    # - mysql
    # - rabbitmq
  tasks:
  - name: install required python libraries
    ansible.builtin.pip:
      executable: pip3.9
      name: "{{item}}"
    loop:
    - botocore 
    - boto3
  - name: create ec2 instance
    amazon.aws.ec2_instance:
      name: "{{item}}"
      instance_type: t3.micro
      security_group: "{{security_group}}"
      image_id: "{{ami}}"
      tags:
        Name: "{{item}}"
    loop: "{{instances}}"
    register: ec2_output

  # - name: print ec2_output
  #   debug:
  #     msg: "{{ec2_output}}"
  
  # - name: print public ip 
  #   debug:
  #     msg: "{{item.instances[0].public_ip_address}}"
  #   loop: "{{ec2_output.results}}"
  
  # - name: print private ip 
  #   debug:
  #     msg: "{{item.instances[0].private_ip_address}}"
  #   loop: "{{ec2_output.results}}"
  
  - name: update route 53
    amazon.aws.route53:
      state: present
      zone: "{{domain_name}}"
      record: "{{item.item}}.{{domain_name}}"
      type: A
      ttl: 1
      value: "{{item.instances[0].private_ip_address}}"
      overwrite: true
    loop: "{{ec2_output.results}}"

  - name: update route 53 for frontend 
    amazon.aws.route53:
      state: present
      zone: "{{domain_name}}"
      record: "{{domain_name}}"
      type: A
      ttl: 1
      value: "{{item.instances[0].public_ip_address}}"
      overwrite: true
    when: item.item == "frontend"
    loop: "{{ec2_output.results}}"