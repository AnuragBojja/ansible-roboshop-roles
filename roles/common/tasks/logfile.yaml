- name: Create directory for logs and set ownership/permissions
  ansible.builtin.file:
    path: /var/log/roboshoplogs
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: '0755'
# - name: Get and display custom formatted timestamp
#   ansible.builtin.set_fact:
#     custom_timestamp: "{{ now(utc=True).strftime('%Y-%m-%d_%H-%M-%S') }}"

- name: Create directory for logs and set ownership/permissions
  ansible.builtin.file:
#    path: "/var/log/roboshoplogs/{{custom_timestamp}}-{{service_name}}.log"
    path: "/var/log/roboshoplogs/{{service_name}}.log"
    state: touch
    owner: ec2-user
    group: ec2-user
    mode: '0644'